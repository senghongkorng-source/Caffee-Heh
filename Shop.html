<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Coffee Shop </title>
     <link rel="stylesheet" href="./Css/style.css">
</head>

<body>
    <nav class="nav">
        <div class="Why">
            <h2>Cafe Free</h2>
        </div>
        <ul class="container-link">
            <li><a href="index.html">HOME</a></li>
            <li><a href="About.html">ABOUT</a></li>
            <li><a href="Shop.html">SHOP</a></li>
            <li><a href="Contact.html">CONTACT</a></li>
        </ul>
        <span class="cart-bag">Cart</span>
    </nav>

    <section class="page">
        <h2>Our Menu</h2>
    </section>

    <section class="shop">
        <div class="product-card">
            <img src="./Image/CaffeeBlack.jpg" alt="Black Coffee">
            <h3>កាហ្វេខ្មៅ</h3>
            <p>២០០០រៀល</p>
            <button>Add to Cart</button>
        </div>
        <div class="product-card">
            <img src="./Image/cow.jpg.jpg" alt="Milk Coffee">
            <h3>កាហ្វេទឹកដោះគោ</h3>
            <p>៣០០០រៀល</p>
            <button>Add to Cart</button>
        </div>
        <div class="product-card">
            <img src="./Image/cafelatte.jpg" alt="Iced Latte">
            <h3>អាយឡាតេ</h3>
            <p>៦០០០រៀល</p>
            <button>Add to Cart</button>
        </div>
        <div class="product-card">
            <img src="./Image/hot.jpg" alt="Hot Coffee">
            <h3>កាហ្វេក្តៅ</h3>
            <p>១០០០០រៀល</p>
            <button>Add to Cart</button>
        </div>
        <div class="product-card">
            <img src="./Image/americano.jpg" alt="Americano">
            <h3>អាមេរិកាណូ</h3>
            <p>១២០០០រៀល</p>
            <button>Add to Cart</button>
        </div>
    </section>
    <Script src="./JavaScript/script.js"></Script>
</body>

</html>
